apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hangry-home-ingress
  namespace: hangry-home
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-production"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - example.com
      secretName: hangry-home-tls
  rules:
    - host: example.com
      http:
        paths:
          - path: /graphql
            pathType: Prefix
            backend:
              service:
                name: hangry-home-server
                port:
                  number: 4000
          - path: /events
            pathType: Prefix
            backend:
              service:
                name: hangry-home-server
                port:
                  number: 4001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hangry-home-client
                port:
                  number: 80
